name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  # Pin uv so setup-uv does not select a brand-new release before the
  # releases.astral.sh mirror has synced it, which creates noisy fallback
  # warnings in otherwise-green runs.
  UV_VERSION: "0.11.8"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read   # Required for actions/checkout (the permissions block replaces defaults, not merges)
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci

      - name: Validate tag and package version agreement
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          tag_name="${GITHUB_REF_NAME}"
          test "$tag_name" = "v${project_version}"
          grep -q "^## \[${project_version}\]" CHANGELOG.md

      - name: Lint release sources
        run: uv run ruff check src/ tests/

      - name: Check release formatting
        run: uv run ruff format --check src/ tests/

      - name: Typecheck release sources
        run: uv run mypy src/ces/ --ignore-missing-imports

      - name: Audit release dependency set
        run: |
          uv export --frozen --group ci --format requirements-txt --no-emit-project --no-hashes --output-file /tmp/ces-publish-requirements.txt
          uv run pip-audit --strict -r /tmp/ces-publish-requirements.txt

      - name: Run tests before publishing
        env:
          CES_DATABASE_URL: "sqlite+aiosqlite:///test.db"
          CES_DATABASE_SYNC_URL: "sqlite:///test.db"
        run: uv run pytest tests/unit/ -q -W error

      - name: Run builder-first smoke tests
        run: uv run pytest tests/integration/test_freshcart_e2e.py -q

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Smoke test installed CLI
        shell: bash
        run: |
          wheel_path="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("controlled_execution_system-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}: {wheels}")
          print(wheels[0].resolve())
          PY
          )"
          smoke_venv="$(mktemp -d)/venv"
          uv venv --python 3.13 "$smoke_venv"
          uv pip install --python "$smoke_venv/bin/python" "$wheel_path"
          "$smoke_venv/bin/ces" --help
          "$smoke_venv/bin/ces" --version
          "$smoke_venv/bin/ces" init --help
          smoke_dir="$(mktemp -d)"
          fake_runtime_dir="$(mktemp -d)"
          cat > "$fake_runtime_dir/codex" <<'EOF'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then echo "codex-cli publish-smoke"; exit 0; fi
          echo "publish smoke runtime stub: execution is not expected" >&2
          exit 2
          EOF
          chmod +x "$fake_runtime_dir/codex"
          cd "$smoke_dir"
          "$smoke_venv/bin/ces" init publish-smoke
          cat > pyproject.toml <<'EOF'
          [project]
          name = "ces-publish-smoke"
          version = "0.1.0"
          EOF
          test -f .ces/config.yaml
          test -f .ces/keys/audit.hmac
          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" doctor --security
          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" --json doctor --project-root "$smoke_dir" > "$smoke_dir/doctor.json"
          python - "$smoke_dir/doctor.json" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["runtime_available"] is True
          assert payload["runtime_safety"]["codex"]["tool_allowlist_enforced"] is False
          PY
          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" --json scan --root "$smoke_dir" > "$smoke_dir/scan.json"
          python - "$smoke_dir/scan.json" <<'PY'
          import json
          import sys

          scan_payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert scan_payload["modules"]
          assert scan_payload["report_path"].endswith(".ces/brownfield/scan.json")
          PY
          "$smoke_venv/bin/ces" baseline
          "$smoke_venv/bin/ces" setup-ci --provider github

          if "$smoke_venv/bin/ces" --json scan --project-root "$smoke_dir" > "$smoke_dir/usage-error.stdout" 2> "$smoke_dir/usage-error.stderr"; then
              echo "Expected JSON usage error smoke to fail" >&2
              exit 1
          fi
          python - "$smoke_dir/usage-error.stderr" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["error"]["type"] == "usage_error"
          assert "--project-root" in payload["error"]["message"]
          PY
          if "$smoke_venv/bin/ces" --json audit --limit nope > "$smoke_dir/error.stdout" 2> "$smoke_dir/error.stderr"; then
              echo "Expected handled JSON error smoke to fail" >&2
              exit 1
          fi
          python - "$smoke_dir/error.stderr" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["error"]["type"] == "user_error"
          assert "--limit" in payload["error"]["message"]
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
