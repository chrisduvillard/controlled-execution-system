name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Pin uv so setup-uv does not select a brand-new release before the
  # releases.astral.sh mirror has synced it, which creates noisy fallback
  # warnings in otherwise-green runs.
  UV_VERSION: "0.11.8"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - run: uv run mypy src/ces/ --ignore-missing-imports

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - name: Audit dependencies for known CVEs
        run: |
          uv export --frozen --group ci --format requirements-txt --no-emit-project --no-hashes --output-file /tmp/ces-ci-requirements.txt
          uv run pip-audit --strict -r /tmp/ces-ci-requirements.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - name: Run local-first tests with coverage
        run: uv run pytest tests/ -m "not integration" --cov=ces --cov-fail-under=90 --cov-report=term-missing -q -W error
      - name: Build distributions
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*

  latest-dependency-bounds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Resolve latest allowed dependencies
        run: uv lock --upgrade
      - run: uv sync --group ci
      - name: Show resolved Rich version
        run: uv run python -c "import importlib.metadata as m; print('rich=' + m.version('rich'))"
      - name: Audit latest allowed dependency set
        run: |
          uv export --group ci --format requirements-txt --no-emit-project --no-hashes --output-file /tmp/ces-latest-requirements.txt
          uv run pip-audit --strict -r /tmp/ces-latest-requirements.txt
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/ces/ --ignore-missing-imports
      - name: Run unit tests against latest allowed dependencies
        run: uv run pytest tests/unit -q
      - name: Smoke CLI help surfaces
        run: |
          uv run ces --help
          uv run ces build --help
