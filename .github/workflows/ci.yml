name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  # Pin uv so setup-uv does not select a brand-new release before the
  # releases.astral.sh mirror has synced it, which creates noisy fallback
  # warnings in otherwise-green runs.
  UV_VERSION: "0.7.22"
  # External actions are pinned to commit SHAs. Source tags:
  # actions/checkout@v6, astral-sh/setup-uv@v7, actions/setup-go@v6.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - run: uv run mypy src/ces/ --ignore-missing-imports


  quality-ratchets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - name: Fail on high-confidence dead code
        run: uv run --no-sync vulture src tests --min-confidence 80

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - name: Audit dependencies for known CVEs
        run: |
          uv export --frozen --group ci --format requirements-txt --no-emit-project --no-hashes --output-file /tmp/ces-ci-requirements.txt
          uv run pip-audit --strict -r /tmp/ces-ci-requirements.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.4"
      - name: Install gitleaks
        run: |
          # gitleaks v8.30.0 still declares the historical module path in go.mod.
          go install github.com/zricethezav/gitleaks/v8@v8.30.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Validate gitleaks detects a synthetic secret
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .gitleaks-synthetic
          prefix="CES_GITLEAKS_SYNTHETIC_SECRET_"
          suffix="ABCDEF1234567890"
          printf 'SYNTHETIC_SECRET=%s%s\n' "$prefix" "$suffix" > .gitleaks-synthetic/fixture.txt
          if gitleaks detect --source .gitleaks-synthetic --config .gitleaks.toml --redact --no-git; then
            echo "Expected gitleaks to detect the synthetic secret fixture." >&2
            exit 1
          fi
          rm -rf .gitleaks-synthetic
      - name: Scan repository history for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --group ci
      - name: Run local-first tests with coverage
        run: uv run pytest tests/ -m "not integration" --cov=ces --cov-fail-under=90 --cov-report=term-missing -q -W error
      - name: Verify clean release tree before build
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code
          git diff --cached --exit-code
          if [[ -n "$(git status --porcelain)" ]]; then
            git status --short
            echo "Refusing to build distributions from a dirty checkout." >&2
            exit 1
          fi
      - name: Remove stale distributions
        run: rm -rf dist
      - name: Build distributions
        run: uv build
      - name: Check distribution metadata
        run: uv run --no-sync twine check dist/*
      - name: Assert distribution artifact set
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          test -f "dist/controlled_execution_system-${project_version}-py3-none-any.whl"
          test -f "dist/controlled_execution_system-${project_version}.tar.gz"
          test "$(find dist -maxdepth 1 -type f ! -name .gitignore | wc -l)" -eq 2
      - name: Smoke built wheel public CLI contract
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("controlled_execution_system-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}: {wheels}")
          print(wheels[0].resolve())
          PY
          )"
          smoke_venv="$(mktemp -d)/venv"
          uv venv --python 3.13 "$smoke_venv"
          uv pip install --python "$smoke_venv/bin/python" "$wheel_path"
          "$smoke_venv/bin/ces" --help
          "$smoke_venv/bin/ces" --version

          smoke_dir="$(mktemp -d)"
          fake_runtime_dir="$(mktemp -d)"
          cat > "$fake_runtime_dir/codex" <<'EOF'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then echo "codex-cli ci-smoke"; exit 0; fi
          echo "ci smoke runtime stub: execution is not expected" >&2
          exit 2
          EOF
          chmod +x "$fake_runtime_dir/codex"
          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" init --project-root "$smoke_dir" --yes
          cat > "$smoke_dir/pyproject.toml" <<'EOF'
          [project]
          name = "ces-ci-smoke"
          version = "0.1.0"
          EOF
          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" --json doctor --project-root "$smoke_dir" > "$smoke_dir/doctor.json"
          python - "$smoke_dir/doctor.json" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["runtime_available"] is True
          assert payload["runtime_safety"]["codex"]["tool_allowlist_enforced"] is False
          PY

          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" --json scan --root "$smoke_dir" > "$smoke_dir/scan.json"
          python - "$smoke_dir/scan.json" <<'PY'
          import json
          import sys

          scan_payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert scan_payload["modules"]
          assert scan_payload["report_path"].endswith(".ces/brownfield/scan.json")
          PY

          git -C "$smoke_dir" init
          git -C "$smoke_dir" config user.email ces-ci@example.invalid
          git -C "$smoke_dir" config user.name "CES CI"
          mkdir -p "$smoke_dir/src" "$smoke_dir/tests"
          printf 'def smoke():\n    return "base"\n' > "$smoke_dir/src/smoke.py"
          printf 'def test_smoke():\n    assert True\n' > "$smoke_dir/tests/test_smoke.py"
          git -C "$smoke_dir" add pyproject.toml src tests
          git -C "$smoke_dir" commit -m "baseline"
          printf 'def smoke():\n    return "changed"\n' > "$smoke_dir/src/smoke.py"
          "$smoke_venv/bin/ces" review --help
          "$smoke_venv/bin/ces" review generate --project-root "$smoke_dir" --base HEAD --objective "Update smoke app" --tracked-only --json > "$smoke_dir/review-generate.json"
          if "$smoke_venv/bin/ces" review generate --project-root "$smoke_dir" --from-build missing-build --base HEAD --tracked-only --json > "$smoke_dir/review-missing-build.out" 2>&1; then
            echo "expected --from-build missing-build to fail" >&2
            exit 1
          fi
          grep -F "No CES builder metadata matched build id: missing-build" "$smoke_dir/review-missing-build.out"
          python - "$smoke_dir/review-generate.json" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["review_id"]
          assert payload["review_brief"].endswith("review-brief.md")
          PY
          "$smoke_venv/bin/ces" review export --project-root "$smoke_dir" --format json > "$smoke_dir/review-export.json"
          python - "$smoke_dir/review-export.json" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["metadata"]["review_id"]
          assert payload["diff_index"]["changed_files"]
          PY
          "$smoke_venv/bin/ces" review github-comment --project-root "$smoke_dir" --dry-run > "$smoke_dir/review-comment.md"
          grep -F "<!-- ces-semantic-review -->" "$smoke_dir/review-comment.md"
          grep -F "CES Semantic Review" "$smoke_dir/review-comment.md"

          (cd "$smoke_dir" && "$smoke_venv/bin/ces" baseline)
          (cd "$smoke_dir" && "$smoke_venv/bin/ces" setup-ci --provider github)

          PATH="$fake_runtime_dir:$PATH" "$smoke_venv/bin/ces" --json scan --project-root "$smoke_dir" > "$smoke_dir/scan-project-root.json"
          python - "$smoke_dir/scan-project-root.json" "$smoke_dir" <<'PY'
          import json
          import pathlib
          import sys

          scan_payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert pathlib.Path(scan_payload["root"]) == pathlib.Path(sys.argv[2]).resolve()
          assert scan_payload["report_path"].endswith(".ces/brownfield/scan.json")
          PY

          if "$smoke_venv/bin/ces" --json scan --definitely-not-an-option "$smoke_dir" > "$smoke_dir/usage-error.stdout" 2> "$smoke_dir/usage-error.stderr"; then
              echo "Expected JSON usage error smoke to fail" >&2
              exit 1
          fi
          python - "$smoke_dir/usage-error.stderr" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["error"]["type"] == "usage_error"
          assert "--definitely-not-an-option" in payload["error"]["message"]
          PY

          if "$smoke_venv/bin/ces" --json audit --limit nope > "$smoke_dir/error.stdout" 2> "$smoke_dir/error.stderr"; then
              echo "Expected handled JSON error smoke to fail" >&2
              exit 1
          fi
          python - "$smoke_dir/error.stderr" <<'PY'
          import json
          import sys

          payload = json.loads(open(sys.argv[1], encoding="utf-8").read())
          assert payload["error"]["type"] == "user_error"
          assert "--limit" in payload["error"]["message"]
          PY

          printf '\n# user-authored ignore\nlocal-only.log\n' >> "$smoke_dir/.gitignore"
          "$smoke_venv/bin/ces" cleanup --project-root "$smoke_dir" > "$smoke_dir/cleanup-preview.txt"
          grep -F "ces cleanup --project-root" "$smoke_dir/cleanup-preview.txt"
          grep -F -- "--yes" "$smoke_dir/cleanup-preview.txt"
          test -d "$smoke_dir/.ces"
          "$smoke_venv/bin/ces" cleanup --project-root "$smoke_dir" --yes
          test ! -e "$smoke_dir/.ces"
          grep -F "local-only.log" "$smoke_dir/.gitignore"
          ! grep -F "CES local state" "$smoke_dir/.gitignore"

  latest-dependency-bounds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: ${{ env.UV_VERSION }}
      - name: Resolve latest allowed dependencies
        run: uv lock --upgrade
      - run: uv sync --group ci
      - name: Show resolved Rich version
        run: uv run python -c "import importlib.metadata as m; print('rich=' + m.version('rich'))"
      - name: Audit latest allowed dependency set
        run: |
          uv export --group ci --format requirements-txt --no-emit-project --no-hashes --output-file /tmp/ces-latest-requirements.txt
          uv run pip-audit --strict -r /tmp/ces-latest-requirements.txt
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/ces/ --ignore-missing-imports
      - name: Run unit tests against latest allowed dependencies
        run: uv run pytest tests/unit -q
      - name: Smoke CLI help surfaces
        run: |
          uv run ces --help
          uv run ces build --help
          uv run ces cleanup --help
