repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, via uv)
        entry: uv run mypy src/ces/ --ignore-missing-imports
        language: system
        pass_filenames: false
        types: [python]
