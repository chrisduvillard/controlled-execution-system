# CES development-time compose file.
#
# Scope: optional PostgreSQL/Redis infrastructure for integration tests that
# exercise the Postgres-backed compatibility suite. *Not* required for the
# published local builder-first workflow — `ces build`, `ces manifest`, etc.
# run against the SQLite-backed `.ces/state.db` with no external services.
#
# See docs/Quickstart.md for the no-Docker/no-Postgres path.
# See .github/workflows/ci.yml for how CI uses these services.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ces
      POSTGRES_PASSWORD: ces_dev
      POSTGRES_DB: ces_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ces_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces -d ces_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ces_pgdata:
