name: CES Gating

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  ces-gating:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install CES
        run: uv tool install controlled-execution-system

      - name: Run CES doctor when a CLI runtime is installed
        run: |
          if command -v claude >/dev/null 2>&1 || command -v codex >/dev/null 2>&1; then
            uv tool run ces doctor
          else
            echo "Skipping ces doctor; no CLI runtime installed on runner."
          fi

      - name: Run CES dogfood review on PR diff
        if: github.event_name == 'pull_request'
        env:
          CES_DEMO_MODE: "1"
        run: uv tool run ces dogfood --base origin/${{ github.base_ref }}

      - name: Upload evidence packet
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ces-evidence
          path: .ces/artifacts/
          if-no-files-found: ignore
