name: CES Gating

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  ces-gating:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install CES
        run: uv tool install controlled-execution-system

      - name: Run CES doctor when a CLI runtime is installed
        run: |
          if command -v claude >/dev/null 2>&1 || command -v codex >/dev/null 2>&1; then
            uv tool run ces doctor
          else
            echo "Skipping ces doctor; no CLI runtime installed on runner."
          fi

      - name: Run CES dogfood review on PR diff
        if: github.event_name == 'pull_request'
        env:
          CES_DEMO_MODE: "1"
        run: uv tool run ces dogfood --base origin/${{ github.base_ref }}

      - name: Upload evidence packet
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ces-evidence
          path: .ces/artifacts/
          if-no-files-found: ignore
